            <td rowspan="4"></td>

            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>

        <!-- Row 3: Two wide cells (colspan="2" each) + 1 single cell = 5 column spaces -->
        <tr>
            <td colspan="2"></td>
            <td colspan="2"></td>
            <td></td>
        </tr>

        <!-- Row 4: Same layout as Row 3 -->
        <tr>
            <td colspan="2"></td>
            <td colspan="2"></td>
            <td></td>
        </tr>

        <!-- Row 5: 5 individual cells to match row 2 -->
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>

        <!-- Row 6 -->
        <tr>
