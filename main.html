<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>

    <h1>HTML Assignment #3</h1>

    <!-- Table 1: 3 rows, 3 columns -->
    <table id="table-1" class="middle">
        <tr>
            <td id="t11">left</td>
            <td id="t12" class="center">center</td>
            <td id="t13" class="right">right</td>
        </tr>
        <tr>
            <td>left</td>
            <td class="center">center</td>
            <td class="right">right</td>
        </tr>
        <tr>
            <td>left</td>
            <td class="center">center</td>
            <td class="right">right</td>
        </tr>
    </table>

    <!-- Table 2: Corrected 6x6 Grid Alignment -->
    <table id="table-2" class="middle">
        <!-- Row 1: Full width spanning 6 columns -->
        <tr>
            <td id="t21" colspan="6"></td>
        </tr>

        <!-- Row 2: 1 rowspan cell + 5 individual cells = 6 total columns -->
        <tr>
            <td rowspan="4"></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>

        <!-- Row 3: 1 small cell + 1 wide cell (colspan 3) + 1 small cell = 5 column spaces -->
        <tr>
            <td></td>
            <td colspan="3"></td>
            <td></td>
        </tr>

        <!-- Row 4: 1 small cell + 1 wide cell (colspan 3) + 1 small cell = 5 column spaces -->
        <tr>
            <td></td>
            <td colspan="3"></td>
            <td></td>
        </tr>

        <!-- Row 5: 5 individual cells to match row 2 -->
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>

        <!-- Row 6: Full width spanning 6 columns -->
        <tr>
            <td colspan="6"></td>
        </tr>
    </table>

    <!-- Table 3: Green/Blue rows, correct image ID mapping -->
    <table id="table-3" class="middle">
        <tr class="green">
            <td colspan="3"></td>
        </tr>
        <tr>
            <td></td>
            <td id="t-image">
                <img
					src="https://www2.d125.org/applied_arts/teched/courses/WEB/portfolios/2013_FallP3/Luthra%20Portfolio/images-1.jpeg"
					alt="image">

        <tr class="blue">
            <td colspan="3"></td>
        </tr>
    </table>

</body>

</html>
