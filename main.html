<!DOCTYPE html>

<body>

    <h1>HTML Assignment #3</h1>

    <!-- Table 1: 3 rows, 3 columns -->
    <table id="table-1" class="middle">
        <tr>
            <td id="t11">left</td>
            <td id="t12" class="center">center</td>
            <td id="t13" class="right">right</td>
        </tr>
        <tr>
            <td>left</td>
            <td class="center">center</td>
            <td class="right">right</td>
        </tr>
        <tr>
            <td>left</td>
            <td class="center">center</td>
            <td class="right">right</td>
        </tr>
    </table>

    <!-- Table 2: Exact 6x6 target grid alignment -->
    <table id="table-2" class="middle">
        <!-- Row 1: Full width spanning 6 columns -->
        <tr>
            <td id="t21" colspan="6"></td>
        </tr>

        <!-- Row 2: Leftmost cell spans down. Remaining 5 columns are separate -->
        <tr>
            <td rowspan="4"></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>

        <!-- Row 3: Middle cells merged in pairs of 2 to create the wide boxes -->
        <tr>
            <td colspan="2"></td>
            <td colspan="2"></td>
            <td></td>
        </tr>

        <!-- Row 4: Middle cells merged in pairs of 2 to create the wide boxes -->
        <tr>
            <td colspan="2"></td>
            <td colspan="2"></td>
            <td></td>
        </tr>

        <!-- Row 5: Returns to 5 separate individual columns -->
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>

        <!-- Row 6: Full width spanning 6 columns -->
        <tr>
            <td colspan="6"></td>
        </tr>
    </table>

    <!-- Table 3: 3 rows with background colors and the basketball image -->
    <table id="table-3" class="middle">
        <tr class="green">
            <td colspan="3"></td>
        </tr>
        <tr>
            <td></td>
            <td id="t-image">
                <img src="https://d125.org" alt="image">
            </td>
            <td></td>
        </tr>
        <tr class="blue">
            <td colspan="3"></td>
        </tr>
    </table>

</body>

</html>
